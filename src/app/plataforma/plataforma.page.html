<ion-content class="wrap">
  <div class="card">
     <div class="accent-bar"></div>

    <div class="brand">
      <div class="brand-icon">
        <img src="assets/logo.svg">
      </div>

      <p>agregra una nueva plataforma para tus transacciones</p>
    </div>

    <div class="field">
      <div class="input-wrap">
        <ion-select [(ngModel)]="selectedPlataform">
          <ion-select-option value="">Elegí una plataforma</ion-select-option>

          @for (plataform of plataforms; track plataform) {
            <ion-select-option [value]="plataform">{{ plataform }}</ion-select-option>
          }

        </ion-select>
      </div>
    </div>

    <div class="field">
      <label>monto actual</label>
      <div class="input-wrap">
       <input type="number" [(ngModel)]="amount" required min="0"/>
      </div>
    </div>

    <label class="error">{{error}}</label>

    <div class="actions">
      <button class="btn-primary" (click)="addPlataform()">agregar plataforma</button>

      <button class="btn-secondary" (click)="goBack()">volver atras</button>
    </div>

  </div>
</ion-content>
